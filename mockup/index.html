<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flavor Bible Explorer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f0e0d;
      color: #f0ece4;
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid #2a2520;
      background: #0f0e0d;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.1rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c8a96e;
      font-weight: normal;
    }

    .logo span { color: #f0ece4; }

    /* ── Mode Toggle ── */
    .mode-toggle {
      display: flex;
      background: #1a1814;
      border: 1px solid #2a2520;
      border-radius: 6px;
      overflow: hidden;
    }

    .mode-btn {
      padding: 7px 18px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      border: none;
      color: #7a6f60;
      font-family: inherit;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: #c8a96e;
      color: #0f0e0d;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.72rem;
      color: #6a5f50;
      letter-spacing: 0.08em;
    }

    .legend-item { display: flex; align-items: center; gap: 7px; }

    .legend-line {
      height: 3px;
      border-radius: 2px;
      width: 28px;
    }

    /* ── Main Layout ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left Panel ── */
    .left-panel {
      width: 260px;
      flex-shrink: 0;
      border-right: 1px solid #2a2520;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      background: #0f0e0d;
    }

    .search-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #6a5f50;
      margin-bottom: 6px;
    }

    .search-input {
      width: 100%;
      background: #1a1814;
      border: 1px solid #2a2520;
      border-radius: 5px;
      padding: 10px 12px;
      color: #f0ece4;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: #c8a96e; }
    .search-input::placeholder { color: #4a4035; }

    .ingredient-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1px solid #2a2520;
      background: #1a1814;
      color: #a09080;
      transition: all 0.18s;
      letter-spacing: 0.04em;
    }

    .chip:hover, .chip.active {
      background: #c8a96e22;
      border-color: #c8a96e;
      color: #c8a96e;
    }

    .section-title {
      font-size: 0.68rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #4a4035;
      margin-bottom: 10px;
    }

    /* strength filter */
    .filter-group { display: flex; flex-direction: column; gap: 8px; }

    .filter-item {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #8a7a68;
    }

    .filter-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .filter-check {
      width: 14px; height: 14px;
      border: 1px solid #3a3028;
      border-radius: 3px;
      margin-left: auto;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      color: #c8a96e;
    }

    /* ── Canvas ── */
    .graph-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg { width: 100%; height: 100%; }

    /* ── Right Panel (notes) ── */
    .right-panel {
      width: 0;
      flex-shrink: 0;
      border-left: 1px solid #2a2520;
      background: #0f0e0d;
      overflow: hidden;
      transition: width 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .right-panel.open { width: 280px; }

    .panel-inner {
      padding: 24px 20px;
      min-width: 280px;
      flex: 1;
    }

    .panel-ingredient {
      font-size: 1.4rem;
      color: #c8a96e;
      margin-bottom: 4px;
    }

    .panel-subtitle {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #4a4035;
      margin-bottom: 20px;
    }

    .panel-section { margin-bottom: 18px; }

    .panel-section-title {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #6a5f50;
      margin-bottom: 8px;
      border-bottom: 1px solid #1e1b17;
      padding-bottom: 5px;
    }

    .strength-badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 12px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .badge-essential { background: #c8a96e33; color: #c8a96e; border: 1px solid #c8a96e55; }
    .badge-highly { background: #e8835033; color: #e88350; border: 1px solid #e8835055; }
    .badge-recommended { background: #6a9e7233; color: #6a9e72; border: 1px solid #6a9e7255; }

    .note-text {
      font-size: 0.82rem;
      color: #9a8e7e;
      line-height: 1.6;
      font-style: italic;
    }

    .also-pairs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }

    .also-chip {
      padding: 3px 9px;
      border-radius: 12px;
      font-size: 0.72rem;
      border: 1px solid #2a2520;
      color: #7a6f60;
      background: #1a1814;
    }

    .close-panel {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #1a1814;
      border: 1px solid #2a2520;
      color: #6a5f50;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
    }

    /* ── Tooltip ── */
    .tooltip {
      position: absolute;
      background: #1e1b17;
      border: 1px solid #3a3028;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.78rem;
      color: #c0b49e;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 100;
      max-width: 180px;
      line-height: 1.5;
    }

    .tooltip.visible { opacity: 1; }

    /* ── Node labels ── */
    .node-label {
      font-size: 11px;
      fill: #c0b49e;
      pointer-events: none;
      text-anchor: middle;
      font-family: 'Georgia', serif;
    }

    .node-label.center {
      font-size: 14px;
      fill: #c8a96e;
      font-weight: bold;
    }

    /* ── Instruction hint ── */
    .hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.72rem;
      color: #3a3028;
      letter-spacing: 0.1em;
      pointer-events: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Flavor <span>Bible</span> Explorer</div>
  <div class="mode-toggle">
    <button class="mode-btn active" onclick="setMode('single', this)">Single</button>
    <button class="mode-btn" onclick="setMode('double', this)">Two Ingredients</button>
  </div>
  <div class="legend">
    <div class="legend-item">
      <div class="legend-line" style="background:#c8a96e; height:5px;"></div>
      <span>Essential</span>
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:#e88350; height:3px;"></div>
      <span>Highly recommended</span>
    </div>
    <div class="legend-item">
      <div class="legend-line" style="background:#6a9e72; height:1.5px;"></div>
      <span>Recommended</span>
    </div>
  </div>
</header>

<div class="main">
  <!-- Left panel -->
  <div class="left-panel">
    <div>
      <div class="search-label">Explore ingredient</div>
      <input class="search-input" type="text" placeholder="e.g. lamb, lemon, thyme…" id="searchInput" />
    </div>

    <div>
      <div class="section-title">Quick picks</div>
      <div class="ingredient-chips">
        <div class="chip active" onclick="selectIngredient('lamb', this)">Lamb</div>
        <div class="chip" onclick="selectIngredient('lemon', this)">Lemon</div>
        <div class="chip" onclick="selectIngredient('mushroom', this)">Mushroom</div>
        <div class="chip" onclick="selectIngredient('chocolate', this)">Chocolate</div>
        <div class="chip" onclick="selectIngredient('tomato', this)">Tomato</div>
        <div class="chip" onclick="selectIngredient('butter', this)">Butter</div>
      </div>
    </div>

    <div>
      <div class="section-title">Show connections</div>
      <div class="filter-group">
        <label class="filter-item">
          <div class="filter-dot" style="background:#c8a96e;"></div>
          Essential
          <div class="filter-check">✓</div>
        </label>
        <label class="filter-item">
          <div class="filter-dot" style="background:#e88350;"></div>
          Highly recommended
          <div class="filter-check">✓</div>
        </label>
        <label class="filter-item">
          <div class="filter-dot" style="background:#6a9e72;"></div>
          Recommended
          <div class="filter-check">✓</div>
        </label>
      </div>
    </div>
  </div>

  <!-- Graph -->
  <div class="graph-area" id="graphArea">
    <svg id="graphSvg"></svg>
    <div class="tooltip" id="tooltip"></div>
    <div class="hint">Click any node to explore its notes</div>
  </div>

  <!-- Right detail panel -->
  <div class="right-panel" id="rightPanel">
    <div style="position:relative;">
      <div class="panel-inner" id="panelContent"></div>
      <div class="close-panel" onclick="closePanel()">✕</div>
    </div>
  </div>
</div>

// ── State ──────────────────────────────────────────────────
let currentIngredient = 'lamb';
let mode = 'single';
let simulation = null;

// ── Helpers ───────────────────────────────────────────────
const strengthColor = s => s === 3 ? '#c8a96e' : s === 2 ? '#e88350' : '#6a9e72';
const strengthWidth = s => s === 3 ? 5 : s === 2 ? 2.5 : 1.2;
const strengthLabel = s => s === 3 ? 'Essential' : s === 2 ? 'Highly Recommended' : 'Recommended';
const badgeClass = s => s === 3 ? 'badge-essential' : s === 2 ? 'badge-highly' : 'badge-recommended';

function nodeRadius(connections) {
  return 10 + connections * 2.2;
}

// ── Main render ────────────────────────────────────────────
function render(ingredientId) {
  currentIngredient = ingredientId;
  const data = GRAPH_DATA[ingredientId];
  if (!data) return;

  const area = document.getElementById('graphArea');
  const W = area.clientWidth;
  const H = area.clientHeight;
  const cx = W / 2, cy = H / 2;

  const svg = d3.select('#graphSvg');
  svg.selectAll('*').remove();

  // Build nodes + links
  const centerNode = { ...data.center, x: cx, y: cy, fixed: true };
  const outerNodes = data.nodes.map(n => ({ ...n }));
  const nodes = [centerNode, ...outerNodes];

  const links = outerNodes.map(n => ({
    source: centerNode.id,
    target: n.id,
    strength: n.strength
  }));

  // Defs for glow
  const defs = svg.append('defs');
  const glow = defs.append('filter').attr('id','glow');
  glow.append('feGaussianBlur').attr('stdDeviation','3').attr('result','coloredBlur');
  const feMerge = glow.append('feMerge');
  feMerge.append('feMergeNode').attr('in','coloredBlur');
  feMerge.append('feMergeNode').attr('in','SourceGraphic');

  // Background grid (subtle)
  const g = svg.append('g');

  // Simulation
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(d => {
      const dist = d.strength === 3 ? 130 : d.strength === 2 ? 180 : 230;
      return dist;
    }).strength(0.8))
    .force('charge', d3.forceManyBody().strength(-400))
    .force('center', d3.forceCenter(cx, cy))
    .force('collision', d3.forceCollide().radius(d => nodeRadius(d.connections) + 20))
    .on('tick', ticked);

  // Fix center node
  centerNode.fx = cx;
  centerNode.fy = cy;

  // Draw links
  const link = g.append('g').selectAll('line')
    .data(links).join('line')
    .attr('stroke', d => strengthColor(d.strength))
    .attr('stroke-width', d => strengthWidth(d.strength))
    .attr('stroke-opacity', 0.6)
    .attr('stroke-linecap', 'round');

  // Draw nodes
  const node = g.append('g').selectAll('g')
    .data(nodes).join('g')
    .style('cursor', d => d.id !== ingredientId ? 'pointer' : 'default')
    .on('click', (event, d) => {
      if (d.id !== ingredientId) openPanel(ingredientId, d.id);
    })
    .on('mouseover', (event, d) => {
      if (d.id === ingredientId) return;
      const note = data.notes[d.id];
      if (!note) return;
      const tt = document.getElementById('tooltip');
      tt.innerHTML = `<strong style="color:${strengthColor(note.strength)}">${strengthLabel(note.strength)}</strong><br>${d.label}`;
      tt.style.left = (event.offsetX + 14) + 'px';
      tt.style.top  = (event.offsetY - 10) + 'px';
      tt.classList.add('visible');
    })
    .on('mousemove', (event) => {
      const tt = document.getElementById('tooltip');
      tt.style.left = (event.offsetX + 14) + 'px';
      tt.style.top  = (event.offsetY - 10) + 'px';
    })
    .on('mouseout', () => {
      document.getElementById('tooltip').classList.remove('visible');
    });

  // Circles
  node.append('circle')
    .attr('r', d => nodeRadius(d.connections))
    .attr('fill', d => d.id === ingredientId ? '#c8a96e18' : '#1a1814')
    .attr('stroke', d => {
      if (d.id === ingredientId) return '#c8a96e';
      const note = data.notes[d.id];
      return note ? strengthColor(note.strength) : '#3a3028';
    })
    .attr('stroke-width', d => d.id === ingredientId ? 2 : 1.5)
    .attr('filter', d => d.id === ingredientId ? 'url(#glow)' : null);

  // Labels
  node.append('text')
    .attr('class', d => d.id === ingredientId ? 'node-label center' : 'node-label')
    .attr('dy', '0.35em')
    .text(d => d.label);

  function ticked() {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  }

  // Drag
  node.call(d3.drag()
    .on('start', (event, d) => {
      if (!event.active) simulation.alphaTarget(0.3).restart();
      if (d.id !== ingredientId) { d.fx = d.x; d.fy = d.y; }
    })
    .on('drag', (event, d) => {
      if (d.id !== ingredientId) { d.fx = event.x; d.fy = event.y; }
    })
    .on('end', (event, d) => {
      if (!event.active) simulation.alphaTarget(0);
      if (d.id !== ingredientId) { d.fx = null; d.fy = null; }
    })
  );
}

// ── Panel ─────────────────────────────────────────────────
function openPanel(centerId, nodeId) {
  const data = GRAPH_DATA[centerId];
  const note = data.notes[nodeId];
  const node = data.nodes.find(n => n.id === nodeId);
  if (!note || !node) return;

  const content = document.getElementById('panelContent');
  content.innerHTML = `
    <div class="panel-ingredient">${node.label}</div>
    <div class="panel-subtitle">Paired with ${data.center.label}</div>

    <div class="panel-section">
      <div class="panel-section-title">Connection strength</div>
      <span class="strength-badge ${badgeClass(note.strength)}">${strengthLabel(note.strength)}</span>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Notes</div>
      <p class="note-text">"${note.text}"</p>
    </div>

    <div class="panel-section">
      <div class="panel-section-title">Also pairs well with</div>
      <div class="also-pairs">
        ${note.also.map(a => `<span class="also-chip">${a}</span>`).join('')}
      </div>
    </div>
  `;

  document.getElementById('rightPanel').classList.add('open');
}

function closePanel() {
  document.getElementById('rightPanel').classList.remove('open');
}

// ── Controls ──────────────────────────────────────────────
function selectIngredient(id, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  closePanel();
  render(id);
}

function setMode(m, btn) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Init ──────────────────────────────────────────────────
render('lamb');
</script>
