<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Flavor Bible — Palette Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fdf9f3;
      color: #2c2010;
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 13px 28px;
      background: #fff;
      border-bottom: 1px solid #ede4d4;
      flex-shrink: 0;
      z-index: 20;
    }

    .logo {
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #b8863a;
      font-weight: normal;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .logo span { color: #2c2010; }

    /* search */
    .search-wrap { position: relative; flex: 1; max-width: 480px; }
    .search-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
      background: #faf5ec;
      border: 1.5px solid #e0d4bc;
      border-radius: 8px;
      padding: 7px 12px;
      min-height: 38px;
      cursor: text;
    }
    .search-bar input {
      border: none; background: none; outline: none;
      font-family: inherit; font-size: 0.85rem; color: #2c2010;
      min-width: 120px; flex: 1;
    }
    .search-bar input::placeholder { color: #c0aa88; }

    .pill {
      display: flex; align-items: center; gap: 5px;
      border-radius: 20px; padding: 3px 10px 3px 8px;
      font-size: 0.73rem; white-space: nowrap; border: 1.5px solid;
    }
    .pill-dot { width: 7px; height: 7px; border-radius: 50%; }
    .pill-x { cursor: pointer; font-size: 10px; opacity: 0.55; margin-left: 2px; }
    .pill-x:hover { opacity: 1; }

    .dropdown {
      position: absolute; top: calc(100% + 5px); left: 0; right: 0;
      background: #fff; border: 1px solid #e0d4bc; border-radius: 8px;
      box-shadow: 0 8px 28px rgba(80,50,10,0.1); z-index: 100;
      overflow: hidden; display: none;
    }
    .dropdown.open { display: block; }
    .dd-item {
      padding: 10px 16px; font-size: 0.83rem; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #f5ede0; transition: background 0.1s;
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover { background: #faf5ec; }
    .dd-sub { font-size: 0.69rem; color: #b8a080; }

    /* legend */
    .legend {
      display: flex; gap: 16px;
      font-size: 0.68rem; color: #a89070;
      letter-spacing: 0.06em; white-space: nowrap; flex-shrink: 0;
      margin-left: auto;
    }
    .leg { display: flex; align-items: center; gap: 6px; }
    .leg-swatch {
      width: 12px; height: 12px; border-radius: 3px; border: 1.5px solid;
    }

    /* ── Board area ── */
    .board-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px 40px;
    }

    /* scrollbar */
    .board-area::-webkit-scrollbar { width: 6px; }
    .board-area::-webkit-scrollbar-track { background: transparent; }
    .board-area::-webkit-scrollbar-thumb { background: #e0d4bc; border-radius: 3px; }

    /* ── Empty state ── */
    .empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%;
      color: #c8b090; text-align: center; gap: 10px;
    }
    .empty .big { font-size: 2.2rem; opacity: 0.35; }
    .empty p { font-size: 0.88rem; letter-spacing: 0.05em; }
    .empty .suggestions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
    .empty-chip {
      padding: 6px 14px; border-radius: 20px; font-size: 0.78rem;
      border: 1px solid #e0d4bc; background: #fff; cursor: pointer;
      color: #8a7050; transition: all 0.15s;
    }
    .empty-chip:hover { background: #faf5ec; border-color: #c8a060; color: #6a4820; }

    /* ── Shared banner ── */
    .shared-banner {
      margin-bottom: 28px;
      animation: fadeSlide 0.3s ease;
    }

    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 0.68rem; letter-spacing: 0.16em;
      text-transform: uppercase; color: #a89070;
    }
    .section-line { flex: 1; height: 1px; background: #ede4d4; }
    .section-count {
      font-size: 0.65rem; color: #c0aa88; letter-spacing: 0.08em;
    }

    /* ── Tile grid (masonry-style) ── */
    .tile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .tile-grid.dense {
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
    }

    /* ── Flavor tile ── */
    .tile {
      border-radius: 10px;
      border: 1.5px solid;
      padding: 12px 14px;
      cursor: pointer;
      transition: transform 0.14s, box-shadow 0.14s;
      position: relative;
      animation: tileIn 0.25s ease both;
    }

    .tile:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(80,50,10,0.1);
    }

    .tile.essential {
      grid-column: span 2;
      padding: 14px 16px;
    }

    .tile-name {
      font-size: 0.88rem;
      color: #2c2010;
      margin-bottom: 3px;
      font-weight: normal;
    }

    .tile.essential .tile-name { font-size: 0.95rem; }

    .tile-note {
      font-size: 0.72rem;
      color: #9a8060;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-style: italic;
    }

    .tile-badge {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
      opacity: 0.7;
    }

    /* shared tile owner dots */
    .tile-owners {
      display: flex; gap: 3px; margin-top: 7px;
    }
    .owner-dot {
      width: 6px; height: 6px; border-radius: 50%;
    }

    /* strength styles */
    .tile.essential    { background: #fdf6e8; border-color: #d4a040; }
    .tile.essential .tile-badge { color: #b87820; }
    .tile.essential .tile-name  { color: #3a2808; }

    .tile.high         { background: #fdf1ea; border-color: #c86840; }
    .tile.high .tile-badge { color: #a04820; }

    .tile.recommended  { background: #edf6f0; border-color: #5a9e6a; }
    .tile.recommended .tile-badge { color: #3a7848; }

    .tile.shared       { background: #f0ecfa; border-color: #8a6ac8; }
    .tile.shared.essential { background: #ece8f8; border-color: #7a5ab8; }
    .tile.shared .tile-badge { color: #5a3a98; }
    .tile.shared .tile-name  { color: #2c1860; }

    .tile.selected {
      box-shadow: 0 0 0 2px #7a5ab8 inset !important;
    }

    /* ── Two-column unique section ── */
    .unique-columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .unique-col { min-width: 0; }

    .col-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }
    .col-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .col-name { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; }

    /* ── Detail card ── */
    .detail {
      position: fixed;
      background: #fff;
      border: 1px solid #e0d4bc;
      border-radius: 10px;
      box-shadow: 0 12px 40px rgba(80,50,10,0.13);
      padding: 18px 20px;
      width: 260px;
      z-index: 200;
      opacity: 0;
      transform: translateY(6px) scale(0.97);
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
    }
    .detail.show { opacity: 1; transform: none; pointer-events: auto; }
    .d-close {
      position: absolute; top: 10px; right: 12px;
      font-size: 12px; color: #b8a080; cursor: pointer;
    }
    .d-close:hover { color: #4a3010; }
    .d-name { font-size: 1.05rem; margin-bottom: 2px; }
    .d-strength { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 8px; }
    .d-shared-tag {
      display: inline-block; font-size: 0.65rem;
      background: #ede8f8; color: #6a52a8; border-radius: 10px;
      padding: 2px 9px; margin-bottom: 8px; letter-spacing: 0.06em;
    }
    .d-note { font-size: 0.78rem; color: #6a5a3a; line-height: 1.6; font-style: italic; margin-bottom: 10px; }
    .d-also-label { font-size: 0.63rem; letter-spacing: 0.12em; text-transform: uppercase; color: #a89070; margin-bottom: 5px; }
    .d-also { display: flex; flex-wrap: wrap; gap: 5px; }
    .d-chip { font-size: 0.7rem; background: #faf5ec; border-radius: 10px; padding: 2px 8px; color: #8a7050; }

    @keyframes tileIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>

let ingredients = [];
let selectedTile = null;

// ═══════════════════════════════════
// SHARED DETECTION
// ═══════════════════════════════════
function getSharedIds() {
  if (ingredients.length < 2) return new Set();
  const sets = ingredients.map(ing => new Set(DATA[ing.id].pairings.map(p => p.id)));
  let shared = new Set(sets[0]);
  for (let i = 1; i < sets.length; i++) shared = new Set([...shared].filter(x => sets[i].has(x)));
  return shared;
}

// ═══════════════════════════════════
// RENDER
// ═══════════════════════════════════
function render() {
  const board = document.getElementById('board');

  if (ingredients.length === 0) {
    board.innerHTML = `
      <div class="empty">
        <div class="big">🍳</div>
        <p>Search for an ingredient to explore its flavour pairings</p>
        <div class="suggestions">
          ${SUGGESTIONS.map(s => `<div class="empty-chip" onclick="pick('${s.id}')">${s.label}</div>`).join('')}
        </div>
      </div>`;
    return;
  }

  const sharedIds = getSharedIds();
  const multi = ingredients.length > 1;
  let html = '';

  if (multi && sharedIds.size > 0) {
    // Collect shared pairings (use first ingredient's version)
    const sharedPairings = DATA[ingredients[0].id].pairings.filter(p => sharedIds.has(p.id));
    sharedPairings.sort((a, b) => b.strength - a.strength);

    html += `
      <div class="shared-banner">
        <div class="section-header">
          <span class="section-title" style="color:#7a5ab8">Shared by ${ingredients.map(i => `<strong>${i.label}</strong>`).join(' & ')}</span>
          <div class="section-line" style="background:#d8d0f0"></div>
          <span class="section-count">${sharedPairings.length} flavour${sharedPairings.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="tile-grid">
          ${sharedPairings.map(p => tileHTML(p, true, true)).join('')}
        </div>
      </div>`;
  }

  if (multi) {
    html += `<div class="unique-columns">`;
    ingredients.forEach(ing => {
      const unique = DATA[ing.id].pairings.filter(p => !sharedIds.has(p.id));
      unique.sort((a, b) => b.strength - a.strength);
      html += `
        <div class="unique-col">
          <div class="col-header">
            <div class="col-dot" style="background:${ing.color}"></div>
            <span class="col-name" style="color:${ing.color}">${ing.label} only</span>
          </div>
          <div class="tile-grid dense">
            ${unique.map(p => tileHTML(p, false, false)).join('')}
          </div>
        </div>`;
    });
    html += `</div>`;
  } else {
    // Single ingredient — one big board
    const ing = ingredients[0];
    const all = [...DATA[ing.id].pairings].sort((a, b) => b.strength - a.strength);
    const byStrength = { 3: all.filter(p => p.strength === 3), 2: all.filter(p => p.strength === 2), 1: all.filter(p => p.strength === 1) };

    [3, 2, 1].forEach(s => {
      if (!byStrength[s].length) return;
      html += `
        <div style="margin-bottom:28px; animation: fadeSlide 0.3s ease;">
          <div class="section-header">
            <span class="section-title">${STRENGTH_LABEL[s]}</span>
            <div class="section-line"></div>
            <span class="section-count">${byStrength[s].length} pairings</span>
          </div>
          <div class="tile-grid">
            ${byStrength[s].map(p => tileHTML(p, false, s === 3)).join('')}
          </div>
        </div>`;
    });
  }

  board.innerHTML = html;

  // Attach click handlers
  board.querySelectorAll('.tile').forEach(tile => {
    tile.addEventListener('click', e => {
      const id = tile.dataset.id;
      const ingIdx = parseInt(tile.dataset.ing);
      const isShared = tile.dataset.shared === '1';

      if (selectedTile && selectedTile.id === id && selectedTile.ingIdx === ingIdx) {
        selectedTile = null;
        hideDetail();
        board.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
        return;
      }

      board.querySelectorAll('.tile').forEach(t => t.classList.remove('selected'));
      tile.classList.add('selected');
      selectedTile = { id, ingIdx };

      const ing = ingredients[ingIdx] || ingredients[0];
      const pairing = DATA[ing.id].pairings.find(p => p.id === id);
      if (pairing) showDetail(pairing, isShared, e.clientX, e.clientY);
    });
  });
}

function tileHTML(p, isShared, isEssential) {
  const cls = [
    'tile',
    isShared ? 'shared' : (p.strength === 3 ? 'essential' : p.strength === 2 ? 'high' : 'recommended'),
    isEssential ? 'essential' : '',
  ].filter(Boolean).join(' ');

  const badge = isShared ? 'Shared' : STRENGTH_LABEL[p.strength];
  const note = isEssential ? `<div class="tile-note">${p.note}</div>` : '';

  return `
    <div class="${cls}" data-id="${p.id}" data-ing="0" data-shared="${isShared ? 1 : 0}">
      <div class="tile-badge">${badge}</div>
      <div class="tile-name">${p.label}</div>
      ${note}
    </div>`;
}

// ═══════════════════════════════════
// DETAIL CARD
// ═══════════════════════════════════
function showDetail(p, isShared, cx, cy) {
  const col = isShared ? '#7a5ab8' : (p.strength === 3 ? '#b87820' : p.strength === 2 ? '#a04820' : '#3a7848');
  document.getElementById('dName').textContent = p.label;
  document.getElementById('dStrength').textContent = STRENGTH_LABEL[p.strength];
  document.getElementById('dStrength').style.color = col;

  const tag = document.getElementById('dSharedTag');
  if (isShared && ingredients.length > 1) {
    tag.textContent = `Shared by ${ingredients.map(i => i.label).join(' & ')}`;
    tag.style.display = 'inline-block';
  } else {
    tag.style.display = 'none';
  }

  document.getElementById('dNote').textContent = `"${p.note}"`;
  document.getElementById('dAlso').innerHTML = p.also.map(a => `<span class="d-chip">${a}</span>`).join('');

  const card = document.getElementById('detail');
  const W = window.innerWidth, H = window.innerHeight;
  let lx = cx + 16, ly = cy - 10;
  if (lx + 270 > W) lx = cx - 276;
  if (ly + 240 > H) ly = cy - 240;
  card.style.left = lx + 'px';
  card.style.top = ly + 'px';
  card.classList.add('show');
}

function hideDetail() {
  document.getElementById('detail').classList.remove('show');
}

// ═══════════════════════════════════
// INGREDIENT MANAGEMENT
// ═══════════════════════════════════
function addIngredient(id) {
  if (ingredients.find(i => i.id === id)) return;
  if (!DATA[id] || ingredients.length >= 4) return;
  ingredients.push({ id, label: DATA[id].label, color: ING_COLORS[ingredients.length] });
  selectedTile = null;
  hideDetail();
  renderPills();
  render();
}

function removeIngredient(id) {
  ingredients = ingredients.filter(i => i.id !== id);
  selectedTile = null;
  hideDetail();
  renderPills();
  render();
}

function renderPills() {
  document.getElementById('pills').innerHTML = ingredients.map(i => `
    <span class="pill" style="color:${i.color}; border-color:${i.color}; background:${i.color}18">
      <span class="pill-dot" style="background:${i.color}"></span>
      ${i.label}
      <span class="pill-x" onclick="event.stopPropagation(); removeIngredient('${i.id}')">✕</span>
    </span>`).join('');
}

// ═══════════════════════════════════
// SEARCH
// ═══════════════════════════════════
const si = document.getElementById('si');
const dd = document.getElementById('dd');

si.addEventListener('input', () => {
  const val = si.value.toLowerCase().trim();
  const matches = SUGGESTIONS.filter(s => s.label.toLowerCase().includes(val) && !ingredients.find(i => i.id === s.id));
  if (val && matches.length) {
    dd.innerHTML = matches.map(m => `<div class="dd-item" onclick="pick('${m.id}')"><span>${m.label}</span><span class="dd-sub">${m.sub}</span></div>`).join('');
    dd.classList.add('open');
  } else { dd.classList.remove('open'); }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dd.classList.remove('open');
});

function pick(id) {
  addIngredient(id);
  si.value = '';
  dd.classList.remove('open');
}

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
render();
</script>
</body>
</html>
