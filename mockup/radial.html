<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Flavor Bible — Radial Rings</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fdf9f3;
      color: #2c2010;
      font-family: 'Georgia', serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 28px;
      background: #fff;
      border-bottom: 1px solid #ede4d4;
      flex-shrink: 0;
      z-index: 20;
      gap: 20px;
    }

    .logo {
      font-size: 0.95rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #b8863a;
      font-weight: normal;
      white-space: nowrap;
    }
    .logo span { color: #2c2010; }

    /* search bar */
    .search-wrap {
      flex: 1;
      max-width: 520px;
      position: relative;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #faf5ec;
      border: 1.5px solid #e0d4bc;
      border-radius: 8px;
      padding: 7px 12px;
      width: 100%;
      flex-wrap: wrap;
      min-height: 38px;
      cursor: text;
    }

    .search-bar input {
      border: none;
      background: none;
      outline: none;
      font-family: inherit;
      font-size: 0.85rem;
      color: #2c2010;
      min-width: 140px;
      flex: 1;
    }
    .search-bar input::placeholder { color: #c0aa88; }

    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      border-radius: 20px;
      padding: 3px 10px 3px 8px;
      font-size: 0.73rem;
      white-space: nowrap;
      border: 1.5px solid;
    }
    .pill-dot { width: 7px; height: 7px; border-radius: 50%; }
    .pill-x { cursor: pointer; font-size: 10px; opacity: 0.6; margin-left: 2px; }
    .pill-x:hover { opacity: 1; }

    /* dropdown */
    .dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #fff;
      border: 1px solid #e0d4bc;
      border-radius: 8px;
      box-shadow: 0 8px 28px rgba(80,50,10,0.1);
      z-index: 100;
      overflow: hidden;
      display: none;
    }
    .dropdown.open { display: block; }
    .dd-item {
      padding: 10px 16px;
      font-size: 0.83rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #f5ede0;
      transition: background 0.1s;
    }
    .dd-item:last-child { border-bottom: none; }
    .dd-item:hover { background: #faf5ec; }
    .dd-sub { font-size: 0.69rem; color: #b8a080; }

    /* legend */
    .legend {
      display: flex;
      gap: 18px;
      font-size: 0.68rem;
      color: #a89070;
      letter-spacing: 0.06em;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .leg { display: flex; align-items: center; gap: 6px; }
    .leg-ring {
      width: 22px; height: 10px;
      border-radius: 2px;
      border: 1.5px solid;
    }

    /* canvas */
    .viz-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* SVG node styles */
    .center-circle { cursor: default; }
    .ring-guide { fill: none; stroke-dasharray: 5 4; }
    .flavor-node { cursor: pointer; transition: none; }
    .flavor-node:hover .node-circle { filter: brightness(1.1); }
    .shared-arc { pointer-events: none; }
    .ring-label {
      font-size: 9px;
      fill: #c8b898;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      pointer-events: none;
      font-family: Georgia, serif;
    }

    /* detail card */
    .detail {
      position: absolute;
      background: #fff;
      border: 1px solid #e0d4bc;
      border-radius: 10px;
      box-shadow: 0 10px 36px rgba(80,50,10,0.12);
      padding: 18px 20px;
      width: 250px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.18s, transform 0.18s;
      z-index: 50;
    }
    .detail.show { opacity: 1; transform: translateY(0); }
    .d-name { font-size: 1.05rem; color: #2c2010; margin-bottom: 2px; }
    .d-strength { font-size: 0.67rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
    .d-shared-tag {
      display: inline-block;
      font-size: 0.67rem;
      background: #ede8f8;
      color: #6a52a8;
      border-radius: 10px;
      padding: 2px 9px;
      margin-bottom: 10px;

    }
    .d-note { font-size: 0.78rem; color: #6a5a3a; line-height: 1.6; font-style: italic; margin-bottom: 10px; }
    .d-also-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: #a89070; margin-bottom: 6px; }
    .d-also { display: flex; flex-wrap: wrap; gap: 5px; }
    .d-chip { font-size: 0.7rem; background: #faf5ec; border-radius: 10px; padding: 2px 8px; color: #8a7050; }

    /* empty state */
    .empty-hint {

      letter-spacing: 0.06em;
      pointer-events: none;
    }
    .empty-hint .big { font-size: 1.5rem; margin-bottom: 8px; opacity: 0.5; }
  </style>
</head>

const SHARED_FILL    = '#f0ecfa';

// Ring radii per mode
const R_SINGLE = [110, 162, 214];
const R_MULTI  = [82,  122, 160];
const NODE_R   = { 3: 19, 2: 15, 1: 11 };

// ═══════════════════════════════════
// STATE
// ═══════════════════════════════════

// ═══════════════════════════════════
// LAYOUT HELPERS
// ═══════════════════════════════════
function getCenters() {
  const W = document.getElementById('vizArea').clientWidth;
  const H = document.getElementById('vizArea').clientHeight;
  const n = ingredients.length;
  if (n === 0) return [];
  if (n === 1) return [{ x: W / 2, y: H / 2 }];

  // Lay out horizontally, evenly spaced
  const margin = W * 0.1;
  const step = (W - margin * 2) / (n - 1 + (n === 1 ? 0 : 0));
  return ingredients.map((_, i) => ({
    x: n === 1 ? W / 2 : margin + i * (W - margin * 2) / (n - 1),
    y: H / 2
  }));
}

function getRings() {
  return ingredients.length === 1 ? R_SINGLE : R_MULTI;
}

// ═══════════════════════════════════
// SHARED FLAVOR DETECTION
// ═══════════════════════════════════
function getSharedIds() {
  if (ingredients.length < 2) return new Set();
  const sets = ingredients.map(ing => new Set(DATA[ing.id].pairings.map(p => p.id)));
  let shared = sets[0];
  for (let i = 1; i < sets.length; i++) {
    shared = new Set([...shared].filter(x => sets[i].has(x)));
  }
  return shared;
}

// ═══════════════════════════════════
// NODE POSITIONS
// ═══════════════════════════════════
function getNodePositions(ingIndex, center, rings) {
  const ingId = ingredients[ingIndex].id;
  const pairings = DATA[ingId].pairings;
  const byStrength = { 3: [], 2: [], 1: [] };
  pairings.forEach(p => byStrength[p.strength].push(p));

  const positions = [];
  [3, 2, 1].forEach((s, ri) => {
    const ring = rings[ri];
    const group = byStrength[s];
    group.forEach((p, i) => {
      // Start angle offset per ring so labels don't crowd
      const startAngle = -Math.PI / 2 + (ri * Math.PI / 6);
      const angle = startAngle + (i / group.length) * Math.PI * 2;
      positions.push({
        pairing: p,
        strength: s,
        angle,
        x: center.x + Math.cos(angle) * ring,
        y: center.y + Math.sin(angle) * ring,
        ring,
        ingIndex,
        ingId,
      });
    });
  });
  return positions;
}

// ═══════════════════════════════════
// SVG HELPERS
// ═══════════════════════════════════
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs = {}) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
  return e;
}
function txt(tag, attrs, text) {
  const e = el(tag, attrs);
  e.textContent = text;
  return e;
}

  if (ingredients.length === 0) return;

  const centers = getCenters();
  const rings = getRings();
  const sharedIds = getSharedIds();
  const multi = ingredients.length > 1;

  // Defs for subtle drop shadow
  const defs = el('defs');
  const filt = el('filter', { id:'shadow', x:'-20%', y:'-20%', width:'140%', height:'140%' });
  const blur = el('feDropShadow', { dx:'0', dy:'2', stdDeviation:'3', 'flood-color':'rgba(80,40,0,0.08)' });
  filt.appendChild(blur);
  defs.appendChild(filt);
  svg.appendChild(defs);

  // ── Per-ingredient groups ──
  const allNodePositions = ingredients.map((ing, i) => getNodePositions(i, centers[i], rings));

  // ── Shared arcs (draw first, behind everything) ──
  if (multi && sharedIds.size > 0) {
    const arcGroup = el('g', { class:'shared-arcs' });

    sharedIds.forEach(fid => {
      // Find this flavor's position in each ingredient's ring
      const pts = allNodePositions.map(positions => positions.find(p => p.pairing.id === fid)).filter(Boolean);
      if (pts.length < 2) return;

      for (let i = 0; i < pts.length - 1; i++) {
        const a = pts[i], b = pts[i + 1];
        // Curve control point: midpoint, pulled inward vertically
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2 - 40;
        const path = el('path', {
          d: `M ${a.x} ${a.y} Q ${mx} ${my} ${b.x} ${b.y}`,
          fill: 'none',
          stroke: SHARED_COLOR,
          'stroke-width': '1.2',
          'stroke-opacity': '0.3',
          'stroke-dasharray': '4 4',
        });
        arcGroup.appendChild(path);
      }
    });
    svg.appendChild(arcGroup);
  }

  // ── Per-ingredient rendering ──
  allNodePositions.forEach((positions, i) => {
    const ing = ingredients[i];
    const center = centers[i];
    const group = el('g', { class:'ingredient-group' });

    // Ring guides
    const ringNames = ['Essential', 'Highly Rec.', 'Recommended'];
    const ringColors = ['#c8922a', '#c06030', '#4a8c5c'];
    rings.forEach((r, ri) => {
      const guide = el('circle', {
        cx: center.x, cy: center.y, r,
        fill: 'none',
        stroke: ringColors[ri],
        'stroke-width': '1',
        'stroke-opacity': '0.18',
        'stroke-dasharray': '5 4',
      });
      group.appendChild(guide);

      // Ring label (right side)
      if (i === ingredients.length - 1) {
        const labelAngle = 0; // 3 o'clock position
        const lx = center.x + r + (multi ? 4 : 6);
        const ly = center.y + 4;
        const label = txt('text', {
          x: lx, y: ly,
          class: 'ring-label',
          'text-anchor': 'start',
        }, ringNames[ri]);
        group.appendChild(label);
      }
    });

    // Center node
    const cr = multi ? 26 : 32;
    const cCircle = el('circle', {
      cx: center.x, cy: center.y, r: cr,
      fill: '#fff',
      stroke: ing.color,
      'stroke-width': '2',
      filter: 'url(#shadow)',
    });
    const cLabel = txt('text', {
      x: center.x, y: center.y + 1,
      'text-anchor': 'middle',
      'dominant-baseline': 'middle',
      fill: ing.color,
      'font-size': multi ? '11' : '13',
      'font-family': 'Georgia, serif',
      'font-weight': 'bold',
    }, ing.label);
    group.appendChild(cCircle);
    group.appendChild(cLabel);

    // Flavor nodes
    positions.forEach(pos => {
      const isShared = sharedIds.has(pos.pairing.id);
      const isSelected = selectedNode && selectedNode.id === pos.pairing.id && selectedNode.ingIndex === pos.ingIndex;
      const col = isShared ? SHARED_COLOR : STRENGTH_COLOR[pos.strength];
      const fill = isShared ? SHARED_FILL : STRENGTH_FILL[pos.strength];
      const r = NODE_R[pos.strength];

      const nodeGroup = el('g', { class:'flavor-node', style:'cursor:pointer' });

      // Circle
      const circle = el('circle', {
        cx: pos.x, cy: pos.y, r,
        fill: isSelected ? col : fill,
        stroke: col,
        'stroke-width': isSelected ? '2' : '1.5',
        filter: 'url(#shadow)',
      });
      nodeGroup.appendChild(circle);

      // Label — positioned radially outward from center
      const labelR = r + 10;
      const lx = pos.x + Math.cos(pos.angle) * labelR;
      const ly = pos.y + Math.sin(pos.angle) * labelR;
      const anchor = Math.cos(pos.angle) > 0.2 ? 'start' : Math.cos(pos.angle) < -0.2 ? 'end' : 'middle';

      // Line from circle to label
      const line = el('line', {
        x1: pos.x + Math.cos(pos.angle) * r,
        y1: pos.y + Math.sin(pos.angle) * r,
        x2: lx - Math.cos(pos.angle) * 4,
        y2: ly - Math.sin(pos.angle) * 4,
        stroke: col,
        'stroke-width': '0.8',
        'stroke-opacity': '0.4',
      });
      nodeGroup.appendChild(line);

      const label = txt('text', {
        x: lx, y: ly,
        'text-anchor': anchor,
        'dominant-baseline': 'middle',
        fill: isSelected ? col : '#4a3820',
        'font-size': '10',
        'font-family': 'Georgia, serif',
        'font-weight': isSelected || isShared ? 'bold' : 'normal',
      }, pos.pairing.label);
      nodeGroup.appendChild(label);

      // Click
      nodeGroup.addEventListener('click', (e) => {
        e.stopPropagation();
        selectedNode = isSelected ? null : { id: pos.pairing.id, ingIndex: pos.ingIndex };
        if (!isSelected) showDetail(pos, isShared, e.clientX, e.clientY);
        else hideDetail();
        render();
      });

      group.appendChild(nodeGroup);
    });

    svg.appendChild(group);
  });

  // Click canvas to deselect
  svg.addEventListener('click', () => { selectedNode = null; hideDetail(); render(); }, { once: true });
}

// ═══════════════════════════════════
// DETAIL CARD
// ═══════════════════════════════════
function showDetail(pos, isShared, cx, cy) {
  const p = pos.pairing;
  const col = isShared ? SHARED_COLOR : STRENGTH_COLOR[p.strength];

  document.getElementById('dName').textContent = p.label;
  document.getElementById('dStrength').textContent = STRENGTH_LABEL[p.strength];
  document.getElementById('dStrength').style.color = col;

  const sharedTag = document.getElementById('dSharedTag');
  if (isShared && ingredients.length > 1) {
    sharedTag.textContent = `Shared by ${ingredients.map(i => i.label).join(' & ')}`;
    sharedTag.style.display = 'inline-block';
  } else {
    sharedTag.style.display = 'none';
  }

  document.getElementById('dNote').textContent = `"${p.note}"`;
  document.getElementById('dAlso').innerHTML = p.also.map(a => `<span class="d-chip">${a}</span>`).join('');

  const card = document.getElementById('detail');
  const area = document.getElementById('vizArea');
  const W = area.clientWidth, H = area.clientHeight;
  const rect = area.getBoundingClientRect();
  let lx = cx - rect.left + 16;
  let ly = cy - rect.top - 20;
  if (lx + 260 > W) lx = cx - rect.left - 270;
  if (ly + 220 > H) ly = cy - rect.top - 220;
  card.style.left = lx + 'px';
  card.style.top = ly + 'px';
  card.classList.add('show');
}

function hideDetail() {
  document.getElementById('detail').classList.remove('show');
}

// ═══════════════════════════════════
// INGREDIENT MANAGEMENT
// ═══════════════════════════════════
function addIngredient(id) {
  if (ingredients.find(i => i.id === id)) return;
  if (!DATA[id]) return;
  if (ingredients.length >= 3) return; // max 3 for readability
  const color = ING_COLORS[ingredients.length];
  ingredients.push({ id, label: DATA[id].label, color });
  selectedNode = null;
  hideDetail();
  renderPills();
  render();
}

function removeIngredient(id) {
  ingredients = ingredients.filter(i => i.id !== id);
  selectedNode = null;
  hideDetail();
  renderPills();
  render();
}

function renderPills() {
  document.getElementById('pills').innerHTML = ingredients.map(i => `
    <span class="pill" style="color:${i.color}; border-color:${i.color}; background:${i.color}18">
      <span class="pill-dot" style="background:${i.color}"></span>
      ${i.label}
      <span class="pill-x" onclick="event.stopPropagation(); removeIngredient('${i.id}')">✕</span>
    </span>
  `).join('');
}

// ═══════════════════════════════════
// SEARCH
// ═══════════════════════════════════
const searchInput = document.getElementById('searchInput');
const dropdown = document.getElementById('dropdown');

searchInput.addEventListener('input', () => {
  const val = searchInput.value.toLowerCase().trim();
  const matches = SUGGESTIONS.filter(s =>
    s.label.toLowerCase().includes(val) && !ingredients.find(i => i.id === s.id)
  );
  if (val.length > 0 && matches.length > 0) {
    dropdown.innerHTML = matches.map(m => `
      <div class="dd-item" onclick="pick('${m.id}')">
        <span>${m.label}</span>
        <span class="dd-sub">${m.sub}</span>
      </div>
    `).join('');
    dropdown.classList.add('open');
  } else {
    dropdown.classList.remove('open');
  }
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open');
});

function pick(id) {
  addIngredient(id);
  searchInput.value = '';
  dropdown.classList.remove('open');
}

// ═══════════════════════════════════
// RESIZE
// ═══════════════════════════════════
window.addEventListener('resize', () => render());

// ═══════════════════════════════════
// INIT
// ═══════════════════════════════════
render();
</script>
</body>
